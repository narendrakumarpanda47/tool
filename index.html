<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-tertiary: #f1f3f4;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --border-color: #e8eaed;
      --accent-color: #8ab4f8;
      --user-msg-bg: #e8f0fe;
      --ai-msg-bg: #f8f9fa;
    }
    .dark {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242424;
      --bg-tertiary: #303030;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --border-color: #3c4043;
      --accent-color: #8ab4f8;
      --user-msg-bg: #303030;
      --ai-msg-bg: #242424;
    }
    body {
      font-family: 'Google Sans', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .sidebar {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
    }
    .chat-item:hover {
      background: var(--bg-tertiary);
    }
    .chat-item.active {
      background: var(--bg-tertiary);
      border-left: 3px solid var(--accent-color);
    }
    .user-message {
      background: var(--user-msg-bg);
    }
    .ai-message {
      background: var(--ai-msg-bg);
    }
    .input-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
    }
    .input-container:focus-within {
      border-color: var(--accent-color);
    }
    .btn-primary {
      background: var(--accent-color);
      color: var(--bg-primary);
    }
    .markdown-content h1, .markdown-content h2, .markdown-content h3 {
      font-weight: 600;
      margin: 0.5rem 0;
    }
    .markdown-content p {
      margin: 0.5rem 0;
    }
    .markdown-content code {
      background: var(--bg-tertiary);
      padding: 0.125rem 0.375rem;
      border-radius: 0.25rem;
      font-family: 'Consolas', monospace;
    }
    .markdown-content pre {
      background: var(--bg-tertiary);
      padding: 1rem;
      border-radius: 0.5rem;
      overflow-x: auto;
      margin: 0.5rem 0;
    }
    .markdown-content pre code {
      background: transparent;
      padding: 0;
    }
    .markdown-content ul, .markdown-content ol {
      padding-left: 1.5rem;
      margin: 0.5rem 0;
    }
    .markdown-content blockquote {
      border-left: 3px solid var(--border-color);
      padding-left: 1rem;
      margin: 0.5rem 0;
      color: var(--text-secondary);
    }
    .typing-cursor::after {
      content: '▋';
      animation: blink 0.7s infinite;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -280px;
        top: 0;
        bottom: 0;
        width: 280px;
        z-index: 50;
        transition: left 0.3s ease;
      }
      .sidebar.open {
        left: 0;
      }
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 40;
      }
      .sidebar-overlay.open {
        display: block;
      }
    }
  </style>
</head>
<body class="h-screen overflow-hidden">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  
  <div class="flex h-full">
    <!-- Sidebar -->
    <aside class="sidebar w-64 flex flex-col h-full" id="sidebar">
      <div class="p-4 border-b border-[var(--border-color)]">
        <button onclick="startNewChat()" class="w-full py-2 px-4 rounded-lg bg-[var(--accent-color)] text-[var(--bg-primary)] font-medium hover:opacity-90 transition">
          + New Chat
        </button>
      </div>
      
      <div class="flex-1 overflow-y-auto p-2" id="chatHistory">
      </div>
      
      <div class="p-2 border-t border-[var(--border-color)]">
        <button onclick="openSettings()" class="w-full py-2 px-4 rounded-lg text-left hover:bg-[var(--bg-tertiary)] transition flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative">
      <!-- Mobile Header -->
      <header class="hidden md:flex items-center p-4 border-b border-[var(--border-color)]">
        <button onclick="toggleSidebar()" class="p-2 rounded-lg hover:bg-[var(--bg-tertiary)] mr-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="text-lg font-medium" id="chatTitle">New Chat</h1>
        <div class="flex-1"></div>
        <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-[var(--bg-tertiary)]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="darkModeIcon">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </header>

      <!-- Mobile Header Visible -->
      <header class="md:hidden flex items-center p-4 border-b border-[var(--border-color)] bg-[var(--bg-secondary)]">
        <button onclick="toggleSidebar()" class="p-2 rounded-lg hover:bg-[var(--bg-tertiary)]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="text-lg font-medium ml-2" id="mobileChatTitle">New Chat</h1>
        <div class="flex-1"></div>
        <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-[var(--bg-tertiary)]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="mobileDarkModeIcon">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </header>

      <!-- Chat Messages -->
      <div class="flex-1 overflow-y-auto p-4" id="chatMessages">
        <div id="messagesContainer" class="max-w-3xl mx-auto space-y-4">
        </div>
      </div>

      <!-- Input Area -->
      <div class="p-4">
        <div class="max-w-3xl mx-auto input-container rounded-xl">
          <textarea 
            id="messageInput" 
            placeholder="Message AI..." 
            class="w-full p-4 bg-transparent resize-none outline-none text-[var(--text-primary)]"
            rows="1"
            onkeydown="handleKeyDown(event)"
            oninput="autoResize(this)"
          ></textarea>
          <div class="flex justify-between items-center px-4 pb-3">
            <span class="text-xs text-[var(--text-secondary)]">AI may make mistakes</span>
            <button 
              onclick="sendMessage()" 
              id="sendBtn"
              class="px-4 py-2 rounded-lg btn-primary font-medium disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Send
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-[var(--bg-primary)] rounded-xl p-6 w-full max-w-md mx-4">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Settings</h2>
        <button onclick="closeSettings()" class="p-2 rounded-lg hover:bg-[var(--bg-tertiary)]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
          <input type="password" id="apiKeyInput" class="w-full p-3 rounded-lg border border-[var(--border-color)] bg-[var(--bg-secondary)] text-[var(--text-primary)] outline-none focus:border-[var(--accent-color)]" placeholder="sk-or-...">
        </div>
        
        <div>
          <label class="block text-sm font-medium mb-1">Model</label>
          <input type="text" id="modelInput" class="w-full p-3 rounded-lg border border-[var(--border-color)] bg-[var(--bg-secondary)] text-[var(--text-primary)] outline-none focus:border-[var(--accent-color)]" placeholder="deepseek/deepseek-r1:free">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">System Prompt</label>
          <textarea id="systemPromptInput" class="w-full p-3 rounded-lg border border-[var(--border-color)] bg-[var(--bg-secondary)] text-[var(--text-primary)] outline-none focus:border-[var(--accent-color)] h-24 resize-none" placeholder="You are a helpful AI assistant..."></textarea>
        </div>
        
        <button onclick="saveSettings()" class="w-full py-3 rounded-lg btn-primary font-medium">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- Rename Modal -->
  <div id="renameModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-[var(--bg-primary)] rounded-xl p-6 w-full max-w-md mx-4">
      <h2 class="text-xl font-semibold mb-4">Rename Chat</h2>
      <input type="text" id="renameInput" class="w-full p-3 rounded-lg border border-[var(--border-color)] bg-[var(--bg-secondary)] text-[var(--text-primary)] outline-none focus:border-[var(--accent-color)] mb-4">
      <div class="flex gap-2">
        <button onclick="closeRenameModal()" class="flex-1 py-3 rounded-lg border border-[var(--border-color)] hover:bg-[var(--bg-tertiary)]">Cancel</button>
        <button onclick="confirmRename()" class="flex-1 py-3 rounded-lg btn-primary font-medium">Rename</button>
      </div>
    </div>
  </div>

  <script>
    let currentChatId = null;
    let chats = {};
    let settings = {
      apiKey: '',
      model: 'deepseek/deepseek-r1:free',
      systemPrompt: ''
    };
    let isStreaming = false;
    let abortController = null;

    function init() {
      loadSettings();
      loadChats();
      applyDarkMode();
      renderChatHistory();
      
      if (Object.keys(chats).length === 0) {
        startNewChat();
      } else {
        const firstChatId = Object.keys(chats)[0];
        selectChat(firstChatId);
      }

      document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);
    }

    function loadSettings() {
      const saved = localStorage.getItem('aiChatSettings');
      if (saved) {
        try {
          settings = JSON.parse(saved);
          document.getElementById('apiKeyInput').value = settings.apiKey || '';
          document.getElementById('modelInput').value = settings.model || 'deepseek/deepseek-r1:free';
          document.getElementById('systemPromptInput').value = settings.systemPrompt || '';
        } catch (e) {
          console.error('Failed to load settings:', e);
        }
      }
    }

    function saveSettings() {
      settings.apiKey = document.getElementById('apiKeyInput').value.trim();
      settings.model = document.getElementById('modelInput').value.trim() || 'deepseek/deepseek-r1:free';
      settings.systemPrompt = document.getElementById('systemPromptInput').value.trim();
      localStorage.setItem('aiChatSettings', JSON.stringify(settings));
      closeSettings();
    }

    function loadChats() {
      const saved = localStorage.getItem('aiChatHistory');
      if (saved) {
        try {
          chats = JSON.parse(saved);
        } catch (e) {
          console.error('Failed to load chats:', e);
          chats = {};
        }
      }
    }

    function saveChats() {
      localStorage.setItem('aiChatHistory', JSON.stringify(chats));
    }

    function startNewChat() {
      const id = 'chat_' + Date.now();
      chats[id] = {
        id: id,
        title: 'New Chat',
        messages: [],
        systemPrompt: ''
      };
      saveChats();
      renderChatHistory();
      selectChat(id);
    }

    function selectChat(id) {
      currentChatId = id;
      renderChatHistory();
      renderMessages();
      updateTitle(chats[id]?.title || 'New Chat');
      closeSidebarMobile();
    }

    function renderChatHistory() {
      const container = document.getElementById('chatHistory');
      container.innerHTML = '';
      
      Object.values(chats).sort((a, b) => {
        const aTime = a.messages[0]?.timestamp || 0;
        const bTime = b.messages[0]?.timestamp || 0;
        return bTime - aTime;
      }).forEach(chat => {
        const div = document.createElement('div');
        div.className = `chat-item p-3 rounded-lg cursor-pointer flex items-center justify-between group ${chat.id === currentChatId ? 'active' : ''}`;
        div.innerHTML = `
          <span class="truncate flex-1" onclick="selectChat('${chat.id}')">${chat.title}</span>
          <div class="hidden group-hover:flex gap-1">
            <button onclick="event.stopPropagation(); openRenameModal('${chat.id}')" class="p-1 rounded hover:bg-[var(--bg-tertiary)]">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button onclick="event.stopPropagation(); deleteChat('${chat.id}')" class="p-1 rounded hover:bg-[var(--bg-tertiary)]">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function deleteChat(id) {
      if (confirm('Delete this chat?')) {
        delete chats[id];
        saveChats();
        if (currentChatId === id) {
          const ids = Object.keys(chats);
          if (ids.length > 0) {
            selectChat(ids[0]);
          } else {
            startNewChat();
          }
        } else {
          renderChatHistory();
        }
      }
    }

    let renameTargetId = null;
    function openRenameModal(id) {
      renameTargetId = id;
      document.getElementById('renameInput').value = chats[id]?.title || '';
      document.getElementById('renameModal').classList.remove('hidden');
      document.getElementById('renameModal').classList.add('flex');
    }

    function closeRenameModal() {
      document.getElementById('renameModal').classList.add('hidden');
      document.getElementById('renameModal').classList.remove('flex');
      renameTargetId = null;
    }

    function confirmRename() {
      if (renameTargetId && chats[renameTargetId]) {
        const newTitle = document.getElementById('renameInput').value.trim() || 'New Chat';
        chats[renameTargetId].title = newTitle;
        saveChats();
        renderChatHistory();
        if (renameTargetId === currentChatId) {
          updateTitle(newTitle);
        }
      }
      closeRenameModal();
    }

    function updateTitle(title) {
      document.getElementById('chatTitle').textContent = title;
      document.getElementById('mobileChatTitle').textContent = title;
    }

    function renderMessages() {
      const container = document.getElementById('messagesContainer');
      container.innerHTML = '';
      
      const chat = chats[currentChatId];
      if (!chat || !chat.messages) return;
      
      chat.messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = msg.role === 'user' ? 'flex justify-end' : 'flex justify-start';
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `max-w-[80%] p-4 rounded-xl ${msg.role === 'user' ? 'user-message' : 'ai-message'}`;
        
        if (msg.role === 'user') {
          msgDiv.innerHTML = `<div class="markdown-content">${escapeHtml(msg.content)}</div>`;
        } else {
          msgDiv.innerHTML = `<div class="markdown-content typing-cursor">${marked.parse(msg.content)}</div>`;
        }
        
        div.appendChild(msgDiv);
        container.appendChild(div);
      });
      
      scrollToBottom();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function scrollToBottom() {
      const container = document.getElementById('chatMessages');
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      if (isStreaming) {
        if (abortController) {
          abortController.abort();
        }
        return;
      }
      
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      
      if (!content) return;
      if (!settings.apiKey) {
        alert('Please set your OpenRouter API Key in Settings');
        openSettings();
        return;
      }
      
      const chat = chats[currentChatId];
      if (!chat) return;
      
      if (chat.messages.length === 0) {
        chat.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
        chat.systemPrompt = settings.systemPrompt;
        updateTitle(chat.title);
        saveChats();
        renderChatHistory();
      }
      
      chat.messages.push({ role: 'user', content: content, timestamp: Date.now() });
      chat.messages.push({ role: 'assistant', content: '', timestamp: Date.now() });
      
      input.value = '';
      autoResize(input);
      
      renderMessages();
      
      isStreaming = true;
      document.getElementById('sendBtn').textContent = 'Stop';
      abortController = new AbortController();
      
      try {
        const messages = [
          ...(chat.systemPrompt ? [{ role: 'system', content: chat.systemPrompt }] : []),
          ...chat.messages.slice(0, -1)
        ];
        
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${settings.apiKey}`
          },
          body: JSON.stringify({
            model: settings.model,
            messages: messages,
            stream: true
          }),
          signal: abortController.signal
        });
        
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error?.message || `HTTP ${response.status}`);
        }
        
        const reader = response.body?.getReader();
        if (!reader) {
          throw new Error('Response body is not readable');
        }
        
        const decoder = new TextDecoder();
        let buffer = '';
        
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          
          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith('data: ')) continue;
            
            if (trimmed === 'data: [DONE]') continue;
            
            try {
              const jsonStr = trimmed.slice(6);
              const data = JSON.parse(jsonStr);
              const content = data.choices?.[0]?.delta?.content || '';
              
              if (content) {
                const lastMsg = chat.messages[chat.messages.length - 1];
                lastMsg.content += content;
                updateLastMessage();
              }
            } catch (e) {
              // Skip invalid JSON
            }
          }
        }
      } catch (error) {
        if (error.name === 'AbortError') {
          console.log('Request aborted');
        } else {
          console.error('Error:', error);
          const lastMsg = chat.messages[chat.messages.length - 1];
          lastMsg.content += `\n\n⚠️ Error: ${error.message}`;
          updateLastMessage();
        }
      } finally {
        isStreaming = false;
        document.getElementById('sendBtn').textContent = 'Send';
        abortController = null;
        saveChats();
        renderChatHistory();
      }
    }

    function updateLastMessage() {
      const container = document.getElementById('messagesContainer');
      const lastDiv = container.lastElementChild;
      if (lastDiv) {
        const msgDiv = lastDiv.querySelector('.ai-message');
        if (msgDiv) {
          const chat = chats[currentChatId];
          const lastMsg = chat?.messages[chat.messages.length - 1];
          msgDiv.innerHTML = `<div class="markdown-content">${marked.parse(lastMsg?.content || '')}</div>`;
        }
      }
      scrollToBottom();
    }

    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
    }

    function closeSidebarMobile() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    }

    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('aiChatDarkMode', isDark ? 'dark' : 'light');
      updateDarkModeIcon();
    }

    function applyDarkMode() {
      const saved = localStorage.getItem('aiChatDarkMode');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
      updateDarkModeIcon();
    }

    function updateDarkModeIcon() {
      const isDark = document.documentElement.classList.contains('dark');
      const icons = ['darkModeIcon', 'mobileDarkModeIcon'];
      icons.forEach(id => {
        const icon = document.getElementById(id);
        if (icon) {
          icon.innerHTML = isDark 
            ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
            : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
        }
      });
    }

    function openSettings() {
      document.getElementById('settingsModal').classList.remove('hidden');
      document.getElementById('settingsModal').classList.add('flex');
      document.getElementById('apiKeyInput').value = settings.apiKey || '';
      document.getElementById('modelInput').value = settings.model || 'deepseek/deepseek-r1:free';
      document.getElementById('systemPromptInput').value = settings.systemPrompt || '';
    }

    function closeSettings() {
      document.getElementById('settingsModal').classList.add('hidden');
      document.getElementById('settingsModal').classList.remove('flex');
    }

    window.addEventListener('click', function(e) {
      const settingsModal = document.getElementById('settingsModal');
      const renameModal = document.getElementById('renameModal');
      
      if (e.target === settingsModal) closeSettings();
      if (e.target === renameModal) closeRenameModal();
    });

    marked.setOptions({
      breaks: true,
      gfm: true
    });

    init();
  </script>
</body>
</html>
