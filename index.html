<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal AI Chat Interface</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body.light { --bg:#f9fafb; --text:#111827; --input:#ffffff; --border:#e5e7eb; }
  body.dark { --bg:#1f2937; --text:#f9fafb; --input:#374151; --border:#4b5563; }
  body { background-color: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
  .chat-message pre { background-color: var(--border); padding:0.5rem; border-radius:0.25rem; overflow-x:auto; }
</style>
</head>
<body class="light min-h-screen flex flex-col">
<div id="loading" class="flex items-center justify-center min-h-screen text-gray-500">Loading App...</div>

<!-- Sidebar -->
<div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-gray-100 dark:bg-gray-800 shadow-lg transform -translate-x-full md:translate-x-0 transition-transform z-20 flex flex-col touch-pan-x">
  <div class="flex items-center justify-between p-4 border-b border-gray-300 dark:border-gray-700">
    <h1 class="font-bold text-lg">Chats</h1>
    <button id="newChatBtn" class="px-2 py-1 bg-blue-500 text-white rounded">New</button>
  </div>
  <div id="chatList" class="flex-1 overflow-y-auto p-2"></div>
  <button id="settingsBtn" class="w-full py-2 border-t border-gray-300 dark:border-gray-700 text-sm">Settings ⚙️</button>
</div>

<!-- Main chat area -->
<div class="flex-1 flex flex-col md:ml-64">
  <div id="chatHeader" class="p-4 border-b border-gray-300 dark:border-gray-700 flex justify-between items-center">
    <button id="sidebarToggle" class="md:hidden px-2 py-1 bg-gray-300 dark:bg-gray-700 rounded">☰</button>
    <span id="chatTitle" class="font-bold text-lg">Welcome</span>
  </div>
  <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

  <!-- Input bar -->
  <div class="sticky bottom-0 bg-var(--bg) p-2 border-t border-gray-300 dark:border-gray-700 flex items-center space-x-2">
    <input id="userInput" type="text" placeholder="Type a message..." class="flex-1 p-2 rounded border border-gray-300 dark:border-gray-600 bg-var(--input) text-var(--text)">
    <button id="sendBtn" class="px-4 py-2 bg-blue-500 text-white rounded">Send</button>
  </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-30">
  <div class="bg-white dark:bg-gray-900 p-4 rounded w-80 max-w-full">
    <h2 class="font-bold mb-4 text-lg">Settings</h2>
    <label class="block mb-2">API Key:</label>
    <input id="apiKeyInput" type="password" class="w-full p-2 mb-4 rounded border border-gray-300 dark:border-gray-600 bg-var(--input) text-var(--text)">
    <label class="block mb-2">Model:</label>
    <input id="modelInput" type="text" value="deepseek/deepseek-r1:free" class="w-full p-2 mb-4 rounded border border-gray-300 dark:border-gray-600 bg-var(--input) text-var(--text)">
    <label class="block mb-2">System Prompt:</label>
    <textarea id="systemPromptInput" rows="3" class="w-full p-2 mb-4 rounded border border-gray-300 dark:border-gray-600 bg-var(--input) text-var(--text)"></textarea>
    <div class="flex justify-between">
      <button id="darkModeToggle" class="px-4 py-2 bg-gray-300 dark:bg-gray-700 rounded">Toggle Dark Mode</button>
      <button id="saveSettings" class="px-4 py-2 bg-blue-500 text-white rounded">Save</button>
    </div>
  </div>
</div>

<script>
(function(){
  const $=id=>document.getElementById(id);
  $('loading').style.display='none';

  let state={
    chats: JSON.parse(localStorage.getItem('chats')||'[]'),
    currentChatId:null,
    apiKey:localStorage.getItem('apiKey')||'',
    model:localStorage.getItem('model')||'deepseek/deepseek-r1:free',
    systemPrompt:localStorage.getItem('systemPrompt')||'',
    darkMode:localStorage.getItem('darkMode')==='true'
  };

  const applyTheme=()=>document.body.className=state.darkMode?'dark min-h-screen flex flex-col':'light min-h-screen flex flex-col';
  applyTheme();
  const saveState=()=>{localStorage.setItem('chats',JSON.stringify(state.chats));localStorage.setItem('apiKey',state.apiKey);localStorage.setItem('model',state.model);localStorage.setItem('systemPrompt',state.systemPrompt);localStorage.setItem('darkMode',state.darkMode);};

  const renderChatList=()=>{
    const list=$('chatList'); list.innerHTML='';
    state.chats.forEach(chat=>{
      const wrapper=document.createElement('div'); wrapper.className='flex items-center justify-between mb-1';
      const btn=document.createElement('button');
      btn.textContent=chat.name||'New Chat';
      btn.className='flex-1 text-left p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700';
      btn.onclick=()=>selectChat(chat.id);
      const controls=document.createElement('div'); controls.className='flex space-x-1';
      const renameBtn=document.createElement('button'); renameBtn.textContent='✏️'; renameBtn.className='px-1';
      renameBtn.onclick=()=>{const newName=prompt('Rename chat',chat.name); if(newName){chat.name=newName; saveState(); renderChatList(); if(chat.id===state.currentChatId)$('chatTitle').textContent=newName;}};
      const deleteBtn=document.createElement('button'); deleteBtn.textContent='🗑️'; deleteBtn.className='px-1';
      deleteBtn.onclick=()=>{if(confirm('Delete this chat?')){state.chats=state.chats.filter(c=>c.id!==chat.id); saveState(); renderChatList(); if(state.currentChatId===chat.id){if(state.chats[0]) selectChat(state.chats[0].id); else addChat();}}};
      controls.appendChild(renameBtn); controls.appendChild(deleteBtn); wrapper.appendChild(btn); wrapper.appendChild(controls); list.appendChild(wrapper);
    });
  };

  const renderMessages=()=>{const container=$('chatMessages'); container.innerHTML=''; if(!state.currentChatId) return; const chat=state.chats.find(c=>c.id===state.currentChatId); chat.messages.forEach(msg=>{const div=document.createElement('div'); div.className='chat-message'; div.innerHTML=`<div class="${msg.role==='user'?'text-right':'text-left'}"><div class="inline-block p-2 rounded ${msg.role==='user'?'bg-blue-100 dark:bg-blue-600 text-black':'bg-gray-200 dark:bg-gray-700'}">${marked.parse(msg.content)}</div></div>`; container.appendChild(div);}); container.scrollTop=container.scrollHeight;};

  const selectChat=id=>{state.currentChatId=id; const chat=state.chats.find(c=>c.id===id); $('chatTitle').textContent=chat.name||'New Chat'; renderMessages();};

  const addChat=()=>{const newChat={id:Date.now(),name:'New Chat',messages:[]}; state.chats.push(newChat); saveState(); renderChatList(); selectChat(newChat.id);};

  const sleep=ms=>new Promise(res=>setTimeout(res,ms));

  const sendMessage=async()=>{
    const input=$('userInput'); if(!input.value.trim()||!state.currentChatId) return; const content=input.value.trim(); input.value='';
    const chat=state.chats.find(c=>c.id===state.currentChatId); chat.messages.push({role:'user',content}); renderMessages(); saveState();

    const div=document.createElement('div'); div.className='chat-message text-left'; const msgDiv=document.createElement('div'); msgDiv.className='inline-block p-2 rounded bg-gray-200 dark:bg-gray-700'; div.appendChild(msgDiv); $('chatMessages').appendChild(div); $('chatMessages').scrollTop=$('chatMessages').scrollHeight;

    let aiContent=''; 
    try{
      const res=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.apiKey},body:JSON.stringify({model:state.model,messages:[{role:'system',content:state.systemPrompt},{role:'user',content}],stream:true})});
      if(!res.body) throw new Error('Streaming not supported');
      const reader=res.body.getReader(); const decoder=new TextDecoder(); let doneReading=false;
      while(!doneReading){
        const {done,value}=await reader.read(); doneReading=done;
        if(value){
          const chunk=decoder.decode(value);
          // Parse each line as JSON safely to avoid "dataprocessing"
          chunk.split('\n').forEach(line=>{
            if(!line.trim()) return;
            try{
              const data=JSON.parse(line);
              if(data.type==='response' && data.content){
                aiContent += data.content;
              }
            }catch(e){}
          });
          msgDiv.innerHTML = marked.parse(aiContent);
          $('chatMessages').scrollTop = $('chatMessages').scrollHeight;
          await sleep(5);
        }
      }
      chat.messages.push({role:'assistant',content:aiContent}); saveState();
    }catch(e){msgDiv.innerHTML=`<span class="text-red-500">Error: ${e.message}</span>`;}
  };

  let startX=0,currentX=0,sidebarOpen=false;
  const sidebar=$('sidebar');
  sidebar.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;});
  sidebar.addEventListener('touchmove',e=>{
    currentX=e.touches[0].clientX; const delta=currentX-startX;
    if(delta>0) sidebar.style.transform=`translateX(${Math.min(delta-256,0)}px)`; 
    else sidebar.style.transform=`translateX(${delta}px)`;
  });
  sidebar.addEventListener('touchend',e=>{
    const delta=currentX-startX;
    if(delta>128) sidebar.style.transform='translateX(0)'; else sidebar.style.transform='translateX(-256px)';
  });

  $('newChatBtn').onclick=addChat;
  $('sendBtn').onclick=sendMessage;
  $('userInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});
  $('sidebarToggle').onclick=()=>sidebar.classList.toggle('-translate-x-full');
  $('settingsBtn').onclick=()=>$('settingsModal').classList.remove('hidden');
  $('saveSettings').onclick=()=>{state.apiKey=$('apiKeyInput').value.trim(); state.model=$('modelInput').value.trim(); state.systemPrompt=$('systemPromptInput').value.trim(); saveState(); $('settingsModal').classList.add('hidden');};
  $('darkModeToggle').onclick=()=>{state.darkMode=!state.darkMode; applyTheme(); saveState();}
  $('settingsModal').onclick=e=>{if(e.target===$('settingsModal')) $('settingsModal').classList.add('hidden');};

  $('apiKeyInput').value=state.apiKey; $('modelInput').value=state.model; $('systemPromptInput').value=state.systemPrompt;
  if(state.chats.length===0) addChat(); else {renderChatList(); selectChat(state.chats[0].id);}
})();
</script>
</body>
</html>
